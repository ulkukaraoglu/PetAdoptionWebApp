<header class="header">
    <div class="header-container">
        <div class="logo">
            <img src="../images/pet-paw.png" alt="Paw Icon" class="paw-icon">
            <img src="../images/logo.png" alt="Logo" class="main-logo">
            <a href="/">Pet Adoption</a>
        </div>

        <nav class="nav-menu">
            <a href="/">Ana Sayfa</a>
            <a href="/about">Hakkımızda</a>
            <a href="/contact">İletişim</a>
        </nav>

        <!-- Giriş yapmamış kullanıcılar için -->
        <div class="header-buttons" id="authButtons">
            <button type="button" class="btn login-btn" id="loginBtn">Giriş Yap</button>
            <button type="button" class="btn signup-btn" id="registerBtn">Kayıt Ol</button>
        </div>

        <!-- Giriş yapmış kullanıcılar için -->
        <div class="user-profile" id="userDropdown" style="display: none;">
            <div class="user-avatar">U</div>
            <span class="user-name">Kullanıcı</span>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="#"><i class="fas fa-user"></i> Profilim</a>
                <a class="dropdown-item" href="#"><i class="fas fa-cog"></i> Ayarlar</a>
                <a class="dropdown-item" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
            </div>
        </div>
        
        <!-- Mobil menü tuşu -->
        <div class="mobile-menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</header>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Auth işlemleri için gerekli script -->
<script src="../js/auth.js"></script>

<script>
    // Mobil menü toggle fonksiyonu
    document.querySelector('.mobile-menu-toggle').addEventListener('click', function() {
        const navMenu = document.querySelector('.nav-menu');
        navMenu.classList.toggle('active');
    });
</script>
